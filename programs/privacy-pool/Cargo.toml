[package]
name = "privacy-pool"
version = "0.1.0"
description = "Created with Anchor"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "privacy_pool"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
# Required by Anchor CLI to generate IDL/types
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.32.1"