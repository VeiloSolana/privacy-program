[package]
name = "privacy-pool"
version = "0.1.0"
description = "Created with Anchor"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "privacy_pool"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
zk-verify = [
    "ark-std",
    "ark-serialize",
    "ark-ff",
    "ark-ec",
    "ark-bn254",
    "ark-groth16",
]

# Required by Anchor CLI to generate IDL/types
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.32.1"

# Arkworks deps for Groth16 verifier (BN254)
ark-std = { version = "0.4", default-features = false, optional = true }
ark-serialize = { version = "0.4", default-features = false, optional = true, features = ["derive"] }
ark-ff = { version = "0.4", default-features = false, optional = true }
ark-ec = { version = "0.4", default-features = false, optional = true }
ark-bn254 = { version = "0.4", default-features = false, optional = true }
ark-groth16 = { version = "0.4", default-features = false, optional = true }